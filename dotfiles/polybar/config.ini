[bar/main]
width = 100%
height = 35
modules-center = time
modules-right = battery
background = #222
foreground = #eee
font-0 = Iosevka Term Nerd Font Mono:size=15

[module/time]
type = internal/date
date = %I:%M %p
interval = 1

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
poll-interval = 5
