[bar/]
width = 100%
height = 35px

background = #272E33
foreground = #D3C6AA

font-0 = Iosevka Term Nerd Font Mono:size=15;2

modules-center = time

wm-restack = generic
override-redirect = false


[module/time]
type = internal/date
interval = 1

time = %I:%M %p
label = %time%


[settings]
screenchange-reload = true
pseudo-transparency = true
